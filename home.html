<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="style.css">
    <link rel="script" href="script.js">
</head>
<body>
    <h2 class="heading">Quizoo</h2>

    <div class="container">
        <h4 class="count">1/10</h4>
        <h4 class="question">What Is The Captial Of India?</h4>
        <div class="options">
            <button>Mumbai</button>
            <button>Kolkata</button>
            <button>Delhi</button>
            <button>Banglore</button>
        </div>

        <div class="buttongroup">
        <button type="submit" class="btn">Next Question</button>
        <button class="btn">Previous Question</button>
        </div>

    </div>
</body>
</html>
